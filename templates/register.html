<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>register page</title>
    <style>
        body{
            background-color: rgb(152, 98, 207);
        }
        div{
            margin-top: 5rem;
            margin-left: 20rem;
            height: 40rem;
            width: 60rem;
    align-content: center;
    background-color: rgb(93, 78, 139);
border-radius: 5rem;}
div *{
    padding-left: 20%;
}
input{
    height: 3rem;
}
    </style>
</head>
<body>
    <b><div>
    <form action="/" >
    <h1 style="padding-left: 15rem;">REGISTER</h1>
    <label for="fname"> FIRST NAME</label>
    <input type="text" id="fname" name="fname" placeholder="Enter your first name" required style="border-radius: 5rem; padding-left:50px ;">
    <br>
    <br><br>
    <label for="lname">LAST NAME</label>
    <input type="text" id="lname" name="lname" placeholder="Enter your last name" required style="border-radius: 5rem; padding-left:50px ;"><br><br><br>
    <label for="PH">PH. NUMBER </label>
    <input type="number" id="PH" name="PH" placeholder="Enter your mobile number" pattern="^[0-9]{10}$" required style="border-radius: 5rem; padding-left:50px ;"><br><br><br>
    <LABEL FOR="username">USERNAME</LABEL>
     <input type="text" id="username" name="username" placeholder="enter your username" required style="border-radius: 5rem; padding-left:50px ;"><br><br><br>
    <label for="pass">PASSWORD</label>
    <input type="password"  id="password"  name="password" placeholder="enter a strong password" pattern="(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*]).{8,}" title="Must contain at least 8 characters, one uppercase letter, one number, and one special character (!@#$%^&*)" required style="border-radius: 5rem; padding-left:50px ;">  <br><br><br>
     <input type="submit" value="register" style="margin-left: 20rem; padding-left: 0%; height: 3rem; border-radius: 10px; width: 5rem; background-color: blue; text-align: center;" >
   </form>
</div></b>
</body>
</html>
